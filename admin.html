<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Menorca Rugby Club</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/images/static/favicon.ico">
    <meta name="theme-color" content="#182B49">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #f0f2f5;
            color: #182B49;
            min-height: 100vh;
        }

        /* Login */
        .admin-login {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .admin-login-card {
            background: #fff;
            border-radius: 12px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        .admin-login-logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .admin-login-logo img { height: 60px; }

        .admin-login-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .admin-login-subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 1.5rem;
        }

        .admin-login-btn {
            width: 100%;
            padding: 0.75rem;
            background: #182B49;
            color: #FFC72C;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 0.5rem;
        }

        .admin-login-btn:hover { opacity: 0.9; }
        .admin-login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .admin-google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }

        .admin-google-btn i { font-size: 1.1rem; }

        .admin-error {
            background: #fdecea;
            color: #b71c1c;
            padding: 0.6rem 0.8rem;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }

        .admin-error.visible { display: block; }

        /* Dashboard */
        .admin-dashboard { display: none; }

        .admin-header {
            background: #182B49;
            color: #fff;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .admin-header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .admin-header-left img { height: 36px; }

        .admin-header h1 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .admin-logout {
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 0.4rem 1rem;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .admin-logout:hover { background: rgba(255,255,255,0.1); }

        .admin-content {
            padding: 1.5rem 2rem;
            max-width: 100%;
            margin: 0 auto;
        }

        /* Tabs */
        .admin-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #e0e0e0;
        }

        .admin-tab {
            padding: 0.75rem 1.5rem;
            background: none;
            border: none;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .admin-tab:hover { color: #182B49; }

        .admin-tab.active {
            color: #182B49;
            border-bottom-color: #FFC72C;
        }

        .admin-tab .tab-count {
            background: #e0e0e0;
            color: #555;
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            font-weight: 700;
        }

        .admin-tab.active .tab-count {
            background: #FFC72C;
            color: #182B49;
        }

        .admin-tab-panel { display: none; }
        .admin-tab-panel.active { display: block; }

        /* Stats */
        .admin-stats {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .admin-stat {
            background: #fff;
            border-radius: 10px;
            padding: 1rem 1.25rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            min-width: 120px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            user-select: none;
        }

        .admin-stat:hover { border-color: #e0e0e0; }

        .admin-stat.active {
            border-color: #FFC72C;
            background: #fffbf0;
        }

        .admin-stat-number {
            font-size: 1.75rem;
            font-weight: 700;
            color: #182B49;
        }

        .admin-stat-label {
            font-size: 0.75rem;
            color: #888;
            font-weight: 500;
            text-transform: capitalize;
        }

        .admin-filter-clear {
            display: none;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3rem 0.8rem;
            background: #FFC72C;
            color: #182B49;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 1rem;
        }

        .admin-filter-clear.visible { display: inline-flex; }

        /* Table */
        .admin-table-wrapper {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            overflow-x: auto;
        }

        .admin-table-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .admin-table-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .admin-refresh {
            background: none;
            border: 1px solid #ddd;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: #555;
            transition: border-color 0.2s;
        }

        .admin-refresh:hover { border-color: #182B49; color: #182B49; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            table-layout: auto;
        }

        thead th {
            text-align: left;
            padding: 0.65rem 0.75rem;
            font-weight: 600;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
            border-bottom: 2px solid #eee;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
        }

        thead th:hover { color: #182B49; }

        thead th .sort-icon {
            font-size: 0.6rem;
            margin-left: 0.25rem;
            opacity: 0.4;
        }

        thead th.sorted .sort-icon { opacity: 1; color: #FFC72C; }
        thead th.no-sort { cursor: default; }
        thead th.no-sort:hover { color: #888; }

        tbody td {
            padding: 0.55rem 0.75rem;
            border-bottom: 1px solid #f5f5f5;
            vertical-align: middle;
            white-space: nowrap;
        }

        tbody tr:hover { background: #fafafa; }

        .admin-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: capitalize;
            white-space: nowrap;
        }

        .admin-badge--normal { background: #e3f2fd; color: #1565c0; }
        .admin-badge--protector { background: #fff3e0; color: #e65100; }
        .admin-badge--gym { background: #e8f5e9; color: #2e7d32; }
        .admin-badge--jugador { background: #f3e5f5; color: #6a1b9a; }
        .admin-badge--familiar { background: #fce4ec; color: #c62828; }
        .admin-badge--available { background: #e8f5e9; color: #2e7d32; }
        .admin-badge--injured { background: #fdecea; color: #b71c1c; }
        .admin-badge--suspended { background: #fff3e0; color: #e65100; }
        .admin-badge--inactive { background: #f5f5f5; color: #999; }

        .admin-foto-thumb {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #eee;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .admin-foto-thumb:hover { transform: scale(1.15); }

        .admin-foto-none {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #f0f0f0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .admin-foto-none:hover { background: #e0e0e0; }

        .admin-loading {
            text-align: center;
            padding: 3rem;
            color: #888;
        }

        .admin-empty {
            text-align: center;
            padding: 3rem;
            color: #aaa;
        }

        .admin-actions {
            display: flex;
            gap: 0.3rem;
        }

        .admin-action-btn {
            background: none;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 0.25rem 0.45rem;
            cursor: pointer;
            color: #555;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .admin-action-btn:hover { border-color: #182B49; color: #182B49; }

        /* Modal */
        .admin-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 1rem;
        }

        .admin-modal-overlay.is-active { display: flex; }

        .admin-modal {
            background: #fff;
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .admin-modal-close {
            position: absolute;
            top: 0.75rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
            line-height: 1;
        }

        .admin-modal-close:hover { color: #333; }

        .admin-modal h3 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
            padding-right: 2rem;
        }

        .admin-modal-field {
            margin-bottom: 1rem;
        }

        .admin-modal-field label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: #182B49;
        }

        .admin-modal-field input,
        .admin-modal-field select {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .admin-modal-field input:focus,
        .admin-modal-field select:focus {
            outline: none;
            border-color: #FFC72C;
        }

        .admin-modal-field input:read-only {
            background: #f5f5f5;
            color: #999;
            cursor: not-allowed;
        }

        .admin-modal-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .admin-foto-modal-preview {
            text-align: center;
            margin-bottom: 1.25rem;
        }

        .admin-foto-modal-preview img {
            max-width: 200px;
            max-height: 250px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid #eee;
        }

        .admin-foto-modal-preview .no-foto {
            width: 150px;
            height: 180px;
            background: #f0f0f0;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #bbb;
            margin: 0 auto;
            gap: 0.5rem;
        }

        .admin-foto-modal-preview .no-foto i { font-size: 2.5rem; }
        .admin-foto-modal-preview .no-foto span { font-size: 0.85rem; }

        .admin-foto-upload-area {
            text-align: center;
            margin-top: 1rem;
        }

        .admin-foto-upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1.2rem;
            background: #182B49;
            color: #FFC72C;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .admin-foto-upload-btn:hover { opacity: 0.9; }
        .admin-foto-upload-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .admin-modal-save {
            width: 100%;
            padding: 0.7rem;
            background: #182B49;
            color: #FFC72C;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 0.5rem;
        }

        .admin-modal-save:hover { opacity: 0.9; }
        .admin-modal-save:disabled { opacity: 0.5; cursor: not-allowed; }

        .admin-modal-msg {
            font-size: 0.8rem;
            text-align: center;
            margin-top: 0.75rem;
            display: none;
        }

        .admin-modal-msg.success { display: block; color: #2e7d32; }
        .admin-modal-msg.error { display: block; color: #b71c1c; }

        .familiar-de-cell {
            font-size: 0.8rem;
            color: #666;
            font-style: italic;
        }

        /* Mobile card view */
        .mobile-cards { display: none; }

        .mobile-card {
            background: #fff;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
        }

        .mobile-card-foto {
            flex-shrink: 0;
        }

        .mobile-card-foto .admin-foto-thumb,
        .mobile-card-foto .admin-foto-none {
            width: 44px;
            height: 44px;
        }

        .mobile-card-info {
            flex: 1;
            min-width: 0;
        }

        .mobile-card-name {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 0.2rem;
        }

        .mobile-card-detail {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 0.15rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .mobile-card-detail strong {
            color: #182B49;
            font-weight: 600;
        }

        .mobile-card-actions {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        @media (max-width: 768px) {
            .admin-header { padding: 0.75rem 1rem; }
            .admin-header h1 { font-size: 0.95rem; }
            .admin-content { padding: 0.75rem; }
            .admin-stats { gap: 0.5rem; }
            .admin-stat {
                min-width: unset;
                flex: 1;
                padding: 0.75rem;
                text-align: center;
            }
            .admin-stat-number { font-size: 1.4rem; }
            .admin-stat-label { font-size: 0.68rem; }
            .admin-modal-row { grid-template-columns: 1fr; }
            .admin-tabs { overflow-x: auto; }
            .admin-tab { padding: 0.6rem 1rem; font-size: 0.85rem; }
            .admin-table-wrapper table { display: none; }
            .mobile-cards { display: block; padding: 0.75rem; }
            .admin-table-header h2 { font-size: 0.95rem; }
            .admin-filter-clear { font-size: 0.75rem; margin-bottom: 0.75rem; }
        }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div class="admin-login" id="loginScreen">
        <div class="admin-login-card">
            <div class="admin-login-logo">
                <img src="assets/images/static/logo.png" alt="Menorca Rugby Club">
            </div>
            <h2 class="admin-login-title">Panel de Administracion</h2>
            <p class="admin-login-subtitle">Accede con tu cuenta de Google autorizada</p>
            <div class="admin-error" id="loginError"></div>
            <button type="button" class="admin-login-btn admin-google-btn" id="googleLoginBtn">
                <i class="fab fa-google"></i> Iniciar sesion con Google
            </button>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="admin-dashboard" id="dashboard">
        <header class="admin-header">
            <div class="admin-header-left">
                <img src="assets/images/static/logo.png" alt="MRC">
                <h1>Panel Admin</h1>
            </div>
            <button class="admin-logout" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Cerrar sesion
            </button>
        </header>

        <div class="admin-content">
            <div class="admin-tabs">
                <button class="admin-tab active" data-tab="socios">
                    <i class="fas fa-id-card"></i> Socios <span class="tab-count" id="sociosCount">0</span>
                </button>
                <button class="admin-tab" data-tab="jugadores">
                    <i class="fas fa-football-ball"></i> Jugadores <span class="tab-count" id="jugadoresCount">0</span>
                </button>
            </div>

            <!-- Socios Panel -->
            <div class="admin-tab-panel active" id="panel-socios">
                <div class="admin-stats" id="sociosStats"></div>
                <button class="admin-filter-clear" id="sociosFilterClear"><i class="fas fa-times"></i> Quitar filtro</button>
                <div class="admin-table-wrapper">
                    <div class="admin-table-header">
                        <h2 id="sociosTableTitle">Socios registrados</h2>
                        <button class="admin-refresh" id="refreshSocios"><i class="fas fa-sync-alt"></i> Actualizar</button>
                    </div>
                    <div id="sociosTable"><div class="admin-loading"><i class="fas fa-spinner fa-spin"></i> Cargando...</div></div>
                </div>
            </div>

            <!-- Jugadores Panel -->
            <div class="admin-tab-panel" id="panel-jugadores">
                <div style="background:#e3f2fd;color:#1565c0;padding:0.6rem 1rem;border-radius:8px;font-size:0.85rem;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;">
                    <i class="fas fa-info-circle"></i>
                    La gestion de jugadores se realiza desde <a href="https://app.menorcarugbyclub.com/players" target="_blank" rel="noopener" style="color:#1565c0;font-weight:600;">app.menorcarugbyclub.com</a>
                </div>
                <div class="admin-stats" id="jugadoresStats"></div>
                <button class="admin-filter-clear" id="jugadoresFilterClear"><i class="fas fa-times"></i> Quitar filtro</button>
                <div class="admin-table-wrapper">
                    <div class="admin-table-header">
                        <h2 id="jugadoresTableTitle">Jugadores registrados</h2>
                        <button class="admin-refresh" id="refreshJugadores"><i class="fas fa-sync-alt"></i> Actualizar</button>
                    </div>
                    <div id="jugadoresTable"><div class="admin-loading"><i class="fas fa-spinner fa-spin"></i> Cargando...</div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Foto Modal -->
    <div class="admin-modal-overlay" id="fotoModal">
        <div class="admin-modal">
            <button class="admin-modal-close" id="fotoModalClose">&times;</button>
            <h3 id="fotoModalTitle">Foto</h3>
            <div class="admin-foto-modal-preview" id="fotoModalPreview"></div>
            <div class="admin-foto-upload-area">
                <input type="file" id="fotoFileInput" accept="image/*" style="display:none">
                <button class="admin-foto-upload-btn" id="fotoUploadBtn"><i class="fas fa-upload"></i> Subir foto</button>
            </div>
            <div class="admin-modal-msg" id="fotoModalMsg"></div>
        </div>
    </div>

    <!-- Edit Socio Modal -->
    <div class="admin-modal-overlay" id="editModal">
        <div class="admin-modal">
            <button class="admin-modal-close" id="editModalClose">&times;</button>
            <h3>Editar socio</h3>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="admin-modal-row">
                    <div class="admin-modal-field">
                        <label>Nombre</label>
                        <input type="text" id="editNombre" readonly>
                    </div>
                    <div class="admin-modal-field">
                        <label>Apellido</label>
                        <input type="text" id="editApellido" readonly>
                    </div>
                </div>
                <div class="admin-modal-field">
                    <label>DNI / NIE / Pasaporte</label>
                    <input type="text" id="editDocumento" required>
                </div>
                <div class="admin-modal-field">
                    <label>Email</label>
                    <input type="email" id="editEmail" readonly>
                </div>
                <div class="admin-modal-field">
                    <label>Fecha de alta</label>
                    <input type="text" id="editFecha" readonly>
                </div>
                <div class="admin-modal-row">
                    <div class="admin-modal-field">
                        <label>Tipo de socio</label>
                        <select id="editTipo">
                            <option value="normal">Normal</option>
                            <option value="protector">Protector</option>
                            <option value="gym">Gym</option>
                            <option value="jugador">Jugador</option>
                            <option value="familiar">Familiar</option>
                        </select>
                    </div>
                    <div class="admin-modal-field">
                        <label>Estado pago</label>
                        <select id="editEstadoPago">
                            <option value="pendiente">Pendiente</option>
                            <option value="completado">Completado</option>
                        </select>
                    </div>
                </div>

    <script>
        const SUPABASE_URL = 'https://hvskwugpxtsumesedyvk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2c2t3dWdweHRzdW1lc2VkeXZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAyMTk2MDgsImV4cCI6MjA3NTc5NTYwOH0.m2jCUOuzwYOhcghabkTQtj-pyBbcoQeSnxZHhRDqjSs';

        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const loginScreen = document.getElementById('loginScreen');
        const dashboard = document.getElementById('dashboard');
        const loginError = document.getElementById('loginError');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const logoutBtn = document.getElementById('logoutBtn');

        let sociosData = [];
        let playersData = [];
        let sociosFilter = null;
        let playersFilter = null;
        let sociosSort = { col: 'created_at', dir: 'desc' };
        let playersSort = { col: 'last_name', dir: 'asc' };

        // ── Auth ──
        (async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                const ok = await checkAuthorized(session.user.email);
                if (ok) showDashboard();
                else {
                    loginError.textContent = 'Tu cuenta (' + session.user.email + ') no esta autorizada.';
                    loginError.classList.add('visible');
                    await sb.auth.signOut();
                }
            }
        })();

        sb.auth.onAuthStateChange(async (event, session) => {
            if (event === 'SIGNED_IN' && session) {
                const ok = await checkAuthorized(session.user.email);
                if (ok) showDashboard();
                else {
                    loginError.textContent = 'Tu cuenta (' + session.user.email + ') no esta autorizada.';
                    loginError.classList.add('visible');
                    await sb.auth.signOut();
                }
            }
        });

        async function checkAuthorized(email) {
            const { data, error } = await sb.from('admin_users').select('email').eq('email', email).single();
            return !error && data;
        }

        googleLoginBtn.addEventListener('click', async () => {
            loginError.classList.remove('visible');
            googleLoginBtn.disabled = true;
            const { error } = await sb.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + '/admin' }
            });
            if (error) {
                loginError.textContent = 'Error al iniciar sesion con Google';
                loginError.classList.add('visible');
                googleLoginBtn.disabled = false;
            }
        });

        logoutBtn.addEventListener('click', async () => {
            await sb.auth.signOut();
            dashboard.style.display = 'none';
            loginScreen.style.display = 'flex';
        });

        async function showDashboard() {
            loginScreen.style.display = 'none';
            dashboard.style.display = 'block';
            await Promise.all([loadSocios(), loadPlayers()]);
        }

        // ── Tabs ──
        document.querySelectorAll('.admin-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.admin-tab-panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
            });
        });

        document.getElementById('refreshSocios').addEventListener('click', loadSocios);
        document.getElementById('refreshJugadores').addEventListener('click', loadPlayers);

        document.getElementById('sociosFilterClear').addEventListener('click', () => {
            sociosFilter = null;
            renderSociosTable();
            renderSociosStats();
        });

        document.getElementById('jugadoresFilterClear').addEventListener('click', () => {
            playersFilter = null;
            renderPlayersTable();
            renderPlayersStats();
        });

        // ── Helpers ──
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + d.getFullYear();
        }

        function isValidImageUrl(url) {
            if (!url) return false;
            if (url.startsWith('http://') || url.startsWith('https://')) return true;
            return false;
        }

        function renderFotoThumb(url, onclick) {
            if (isValidImageUrl(url)) {
                return `<img src="${escapeHtml(url)}" class="admin-foto-thumb" alt="Foto" onerror="this.outerHTML='<div class=\\'admin-foto-none\\' ${onclick}><i class=\\'fas fa-user\\'></i></div>'" ${onclick}>`;
            }
            return `<div class="admin-foto-none" ${onclick}><i class="fas fa-user"></i></div>`;
        }

        // ── Socios ──
        async function loadSocios() {
            const container = document.getElementById('sociosTable');
            container.innerHTML = '<div class="admin-loading"><i class="fas fa-spinner fa-spin"></i> Cargando socios...</div>';

            const { data, error } = await sb.from('socios').select('*').order('created_at', { ascending: false });

            if (error) {
                container.innerHTML = '<div class="admin-empty"><i class="fas fa-exclamation-triangle"></i> Error: ' + escapeHtml(error.message) + '</div>';
                return;
            }

            sociosData = data || [];
            sociosFilter = null;
            document.getElementById('sociosCount').textContent = sociosData.length;
            renderSociosStats();
            renderSociosTable();
        }

        function renderSociosStats() {
            const tipos = {};
            sociosData.forEach(s => {
                const t = s.tipo_socio || 'sin tipo';
                tipos[t] = (tipos[t] || 0) + 1;
            });

            let html = `<div class="admin-stat ${!sociosFilter ? 'active' : ''}" onclick="filterSocios(null)">
                <div class="admin-stat-number">${sociosData.length}</div><div class="admin-stat-label">Total</div></div>`;
            Object.entries(tipos).forEach(([tipo, count]) => {
                const isActive = sociosFilter && sociosFilter.key === 'tipo_socio' && sociosFilter.value === tipo;
                html += `<div class="admin-stat ${isActive ? 'active' : ''}" onclick="filterSocios('${escapeHtml(tipo)}')">
                    <div class="admin-stat-number">${count}</div><div class="admin-stat-label">${escapeHtml(tipo)}</div></div>`;
            });
            document.getElementById('sociosStats').innerHTML = html;

            const clearBtn = document.getElementById('sociosFilterClear');
            clearBtn.classList.toggle('visible', !!sociosFilter);
        }

        function filterSocios(tipo) {
            if (!tipo || (sociosFilter && sociosFilter.value === tipo)) {
                sociosFilter = null;
            } else {
                sociosFilter = { key: 'tipo_socio', value: tipo };
            }
            renderSociosStats();
            renderSociosTable();
        }

        function sortData(data, col, dir) {
            return [...data].sort((a, b) => {
                let va = a[col] || '', vb = b[col] || '';
                if (typeof va === 'string') va = va.toLowerCase();
                if (typeof vb === 'string') vb = vb.toLowerCase();
                if (va < vb) return dir === 'asc' ? -1 : 1;
                if (va > vb) return dir === 'asc' ? 1 : -1;
                return 0;
            });
        }

        function sortIcon(currentSort, col) {
            const isActive = currentSort.col === col;
            const icon = isActive ? (currentSort.dir === 'asc' ? 'fa-sort-up' : 'fa-sort-down') : 'fa-sort';
            return `<i class="fas ${icon} sort-icon"></i>`;
        }

        function sociosSortClick(col) {
            if (sociosSort.col === col) {
                sociosSort.dir = sociosSort.dir === 'asc' ? 'desc' : 'asc';
            } else {
                sociosSort = { col, dir: 'asc' };
            }
            renderSociosTable();
        }

        function playersSortClick(col) {
            if (playersSort.col === col) {
                playersSort.dir = playersSort.dir === 'asc' ? 'desc' : 'asc';
            } else {
                playersSort = { col, dir: 'asc' };
            }
            renderPlayersTable();
        }

        function renderSociosTable() {
            const container = document.getElementById('sociosTable');
            let filtered = sociosFilter
                ? sociosData.filter(s => (s.tipo_socio || 'sin tipo') === sociosFilter.value)
                : sociosData;

            // Sort - handle combined name column
            if (sociosSort.col === 'nombre_full') {
                filtered = [...filtered].sort((a, b) => {
                    const va = ((a.apellido || '') + ' ' + (a.nombre || '')).toLowerCase();
                    const vb = ((b.apellido || '') + ' ' + (b.nombre || '')).toLowerCase();
                    if (va < vb) return sociosSort.dir === 'asc' ? -1 : 1;
                    if (va > vb) return sociosSort.dir === 'asc' ? 1 : -1;
                    return 0;
                });
            } else {
                filtered = sortData(filtered, sociosSort.col, sociosSort.dir);
            }

            const title = document.getElementById('sociosTableTitle');
            title.textContent = sociosFilter
                ? `Socios: ${sociosFilter.value} (${filtered.length})`
                : 'Socios registrados';

            if (filtered.length === 0) {
                container.innerHTML = '<div class="admin-empty"><i class="fas fa-users"></i> No hay socios' + (sociosFilter ? ' con este filtro' : '') + '.</div>';
                return;
            }

            const cols = [
                { key: null, label: 'Foto', noSort: true },
                { key: 'nombre_full', label: 'Nombre' },
                { key: 'documento', label: 'DNI/NIE/Pas.' },
                { key: 'email', label: 'Email' },
                { key: 'tipo_socio', label: 'Tipo' },
                { key: 'familiar_de', label: 'Familiar de' },
                { key: 'created_at', label: 'Alta' },
                { key: null, label: 'Acc.', noSort: true }
            ];

            let html = '<table><thead><tr>';
            cols.forEach(c => {
                if (c.noSort) {
                    html += `<th class="no-sort">${c.label}</th>`;
                } else {
                    const cls = sociosSort.col === c.key ? 'sorted' : '';
                    html += `<th class="${cls}" onclick="sociosSortClick('${c.key}')">${c.label} ${sortIcon(sociosSort, c.key)}</th>`;
                }
            });
            html += '</tr></thead><tbody>';

            // Mobile cards
            let mobileHtml = '';

            filtered.forEach(s => {
                const onclick = `onclick="openFotoModal('socio','${s.id}')"`;
                const foto = renderFotoThumb(s.foto_url, onclick);
                const tipo = s.tipo_socio || '-';
                const nombre = `${escapeHtml(s.apellido || '')} ${escapeHtml(s.nombre || '')}`.trim();

                html += `<tr>
                    <td>${foto}</td>
                    <td>${nombre}</td>
                    <td>${escapeHtml(s.documento || '')}</td>
                    <td>${escapeHtml(s.email || '')}</td>
                    <td><span class="admin-badge admin-badge--${tipo}">${escapeHtml(tipo)}</span></td>
                    <td class="familiar-de-cell">${escapeHtml(s.familiar_de || '')}</td>
                    <td>${formatDate(s.created_at)}</td>
                    <td><div class="admin-actions">
                        <button class="admin-action-btn" onclick="openEditModal('${s.id}')" title="Editar"><i class="fas fa-pen"></i></button>
                        <button class="admin-action-btn" onclick="openFotoModal('socio','${s.id}')" title="Foto"><i class="fas fa-camera"></i></button>
                    </div></td>
                </tr>`;

                mobileHtml += `<div class="mobile-card">
                    <div class="mobile-card-foto">${foto}</div>
                    <div class="mobile-card-info">
                        <div class="mobile-card-name">${nombre}</div>
                        <div class="mobile-card-detail"><span class="admin-badge admin-badge--${tipo}">${escapeHtml(tipo)}</span> ${formatDate(s.created_at)}</div>
                        <div class="mobile-card-detail">${escapeHtml(s.email || '')}</div>
                        ${s.documento ? `<div class="mobile-card-detail"><strong>Doc:</strong> ${escapeHtml(s.documento)}</div>` : ''}
                        ${s.familiar_de ? `<div class="mobile-card-detail"><strong>Familiar de:</strong> ${escapeHtml(s.familiar_de)}</div>` : ''}
                    </div>
                    <div class="mobile-card-actions">
                        <button class="admin-action-btn" onclick="openEditModal('${s.id}')" title="Editar"><i class="fas fa-pen"></i></button>
                        <button class="admin-action-btn" onclick="openFotoModal('socio','${s.id}')" title="Foto"><i class="fas fa-camera"></i></button>
                    </div>
                </div>`;
            });

            html += '</tbody></table>';
            html += `<div class="mobile-cards">${mobileHtml}</div>`;
            container.innerHTML = html;
        }

        // ── Players ──
        async function loadPlayers() {
            const container = document.getElementById('jugadoresTable');
            container.innerHTML = '<div class="admin-loading"><i class="fas fa-spinner fa-spin"></i> Cargando jugadores...</div>';

            const { data, error } = await sb.from('players').select('*').order('last_name', { ascending: true });

            if (error) {
                container.innerHTML = '<div class="admin-empty"><i class="fas fa-exclamation-triangle"></i> Error: ' + escapeHtml(error.message) + '</div>';
                return;
            }

            playersData = data || [];
            playersFilter = null;
            document.getElementById('jugadoresCount').textContent = playersData.length;
            renderPlayersStats();
            renderPlayersTable();
        }

        function renderPlayersStats() {
            const statuses = {};
            const categories = {};
            playersData.forEach(p => {
                const st = p.status || 'unknown';
                statuses[st] = (statuses[st] || 0) + 1;
                const cat = p.category_primary || 'sin categoria';
                categories[cat] = (categories[cat] || 0) + 1;
            });

            let html = `<div class="admin-stat ${!playersFilter ? 'active' : ''}" onclick="filterPlayers(null, null)">
                <div class="admin-stat-number">${playersData.length}</div><div class="admin-stat-label">Total</div></div>`;
            Object.entries(statuses).forEach(([st, count]) => {
                const isActive = playersFilter && playersFilter.key === 'status' && playersFilter.value === st;
                html += `<div class="admin-stat ${isActive ? 'active' : ''}" onclick="filterPlayers('status','${escapeHtml(st)}')">
                    <div class="admin-stat-number">${count}</div><div class="admin-stat-label">${escapeHtml(st)}</div></div>`;
            });
            Object.entries(categories).forEach(([cat, count]) => {
                const isActive = playersFilter && playersFilter.key === 'category_primary' && playersFilter.value === cat;
                html += `<div class="admin-stat ${isActive ? 'active' : ''}" onclick="filterPlayers('category_primary','${escapeHtml(cat)}')">
                    <div class="admin-stat-number">${count}</div><div class="admin-stat-label">${escapeHtml(cat)}</div></div>`;
            });
            document.getElementById('jugadoresStats').innerHTML = html;

            const clearBtn = document.getElementById('jugadoresFilterClear');
            clearBtn.classList.toggle('visible', !!playersFilter);
        }

        function filterPlayers(key, value) {
            if (!key || (playersFilter && playersFilter.key === key && playersFilter.value === value)) {
                playersFilter = null;
            } else {
                playersFilter = { key, value };
            }
            renderPlayersStats();
            renderPlayersTable();
        }

        function renderPlayersTable() {
            const container = document.getElementById('jugadoresTable');
            let filtered = playersFilter
                ? playersData.filter(p => (p[playersFilter.key] || 'unknown') === playersFilter.value)
                : playersData;

            if (playersSort.col === 'nombre_full') {
                filtered = [...filtered].sort((a, b) => {
                    const va = ((a.last_name || '') + ' ' + (a.first_name || '')).toLowerCase();
                    const vb = ((b.last_name || '') + ' ' + (b.first_name || '')).toLowerCase();
                    if (va < vb) return playersSort.dir === 'asc' ? -1 : 1;
                    if (va > vb) return playersSort.dir === 'asc' ? 1 : -1;
                    return 0;
                });
            } else {
                filtered = sortData(filtered, playersSort.col, playersSort.dir);
            }

            const title = document.getElementById('jugadoresTableTitle');
            title.textContent = playersFilter
                ? `Jugadores: ${playersFilter.value} (${filtered.length})`
                : 'Jugadores registrados';

            if (filtered.length === 0) {
                container.innerHTML = '<div class="admin-empty"><i class="fas fa-football-ball"></i> No hay jugadores' + (playersFilter ? ' con este filtro' : '') + '.</div>';
                return;
            }

            const cols = [
                { key: null, label: 'Foto', noSort: true },
                { key: 'nombre_full', label: 'Nombre' },
                { key: 'status', label: 'Estado' },
                { key: 'ficha_number', label: 'Ficha' },
                { key: 'email', label: 'Email' },
                { key: 'phone', label: 'Tel.' },
                { key: 'tax_number', label: 'Documento' },
                { key: 'gender', label: 'Gen.' },
                { key: 'dob', label: 'Nac.' },
                { key: 'created_at', label: 'Alta' }
            ];

            let html = '<table><thead><tr>';
            cols.forEach(c => {
                if (c.noSort) {
                    html += `<th class="no-sort">${c.label}</th>`;
                } else {
                    const cls = playersSort.col === c.key ? 'sorted' : '';
                    html += `<th class="${cls}" onclick="playersSortClick('${c.key}')">${c.label} ${sortIcon(playersSort, c.key)}</th>`;
                }
            });
            html += '</tr></thead><tbody>';

            let mobileHtml = '';

            filtered.forEach(p => {
                const onclick = `onclick="openFotoModal('player','${escapeHtml(p.player_id)}')"`;
                const foto = renderFotoThumb(p.photo, onclick);
                const statusClass = `admin-badge--${p.status || 'inactive'}`;
                const docDisplay = p.tax_number ? `${(p.tax_type || '').toUpperCase()} ${p.tax_number}` : '';
                const nombre = `${escapeHtml(p.last_name || '')} ${escapeHtml(p.first_name || '')}`.trim();

                html += `<tr>
                    <td>${foto}</td>
                    <td>${nombre}</td>
                    <td><span class="admin-badge ${statusClass}">${escapeHtml(p.status || '')}</span></td>
                    <td>${escapeHtml(p.ficha_number || '')}</td>
                    <td>${escapeHtml(p.email || '')}</td>
                    <td>${escapeHtml(p.phone || '')}</td>
                    <td>${escapeHtml(docDisplay)}</td>
                    <td>${escapeHtml(p.gender || '')}</td>
                    <td>${formatDate(p.dob)}</td>
                    <td>${formatDate(p.created_at)}</td>
                </tr>`;

                mobileHtml += `<div class="mobile-card">
                    <div class="mobile-card-foto">${foto}</div>
                    <div class="mobile-card-info">
                        <div class="mobile-card-name">${nombre}</div>
                        <div class="mobile-card-detail"><span class="admin-badge ${statusClass}">${escapeHtml(p.status || '')}</span> ${p.ficha_number ? 'Ficha: ' + escapeHtml(p.ficha_number) : ''}</div>
                        ${p.email ? `<div class="mobile-card-detail">${escapeHtml(p.email)}</div>` : ''}
                        ${p.phone ? `<div class="mobile-card-detail"><strong>Tel:</strong> ${escapeHtml(p.phone)}</div>` : ''}
                        ${docDisplay ? `<div class="mobile-card-detail"><strong>Doc:</strong> ${escapeHtml(docDisplay)}</div>` : ''}
                        <div class="mobile-card-detail"><strong>Nac:</strong> ${formatDate(p.dob)} ${p.gender ? '| ' + escapeHtml(p.gender) : ''}</div>
                    </div>
                </div>`;
            });

            html += '</tbody></table>';
            html += `<div class="mobile-cards">${mobileHtml}</div>`;
            container.innerHTML = html;
        }

        // ── Foto Modal ──
        const fotoModal = document.getElementById('fotoModal');
        const fotoModalClose = document.getElementById('fotoModalClose');
        const fotoModalPreview = document.getElementById('fotoModalPreview');
        const fotoModalTitle = document.getElementById('fotoModalTitle');
        const fotoFileInput = document.getElementById('fotoFileInput');
        const fotoUploadBtn = document.getElementById('fotoUploadBtn');
        const fotoModalMsg = document.getElementById('fotoModalMsg');
        let currentFotoId = null;
        let currentFotoType = null;

        function openFotoModal(type, id) {
            currentFotoType = type;
            currentFotoId = id;
            fotoModalMsg.className = 'admin-modal-msg';
            fotoModalMsg.textContent = '';
            fotoFileInput.value = '';

            let name = '', photoUrl = '';
            if (type === 'socio') {
                const s = sociosData.find(s => s.id === id);
                if (!s) return;
                name = `${s.nombre} ${s.apellido}`;
                photoUrl = s.foto_url;
            } else {
                const p = playersData.find(p => p.player_id === id);
                if (!p) return;
                name = `${p.first_name} ${p.last_name}`;
                photoUrl = p.photo;
            }

            fotoModalTitle.textContent = `Foto - ${name}`;
            if (isValidImageUrl(photoUrl)) {
                fotoModalPreview.innerHTML = `<img src="${escapeHtml(photoUrl)}" alt="Foto" onerror="this.outerHTML='<div class=\\'no-foto\\'><i class=\\'fas fa-user\\'></i><span>Sin foto</span></div>'">`;
            } else {
                fotoModalPreview.innerHTML = `<div class="no-foto"><i class="fas fa-user"></i><span>Sin foto</span></div>`;
            }

            fotoModal.classList.add('is-active');
        }

        fotoModalClose.addEventListener('click', () => fotoModal.classList.remove('is-active'));
        fotoModal.addEventListener('click', e => { if (e.target === fotoModal) fotoModal.classList.remove('is-active'); });
        fotoUploadBtn.addEventListener('click', () => fotoFileInput.click());

        fotoFileInput.addEventListener('change', async e => {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('image/')) return;

            fotoUploadBtn.disabled = true;
            fotoUploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Subiendo...';
            fotoModalMsg.className = 'admin-modal-msg';

            const ext = file.name.split('.').pop();
            const filePath = `${Date.now()}_${currentFotoId}.${ext}`;

            const { error: uploadError } = await sb.storage
                .from('fotos-socios')
                .upload(filePath, file, { cacheControl: '3600', upsert: false });

            if (uploadError) {
                fotoModalMsg.textContent = 'Error al subir: ' + uploadError.message;
                fotoModalMsg.className = 'admin-modal-msg error';
                fotoUploadBtn.disabled = false;
                fotoUploadBtn.innerHTML = '<i class="fas fa-upload"></i> Subir foto';
                return;
            }

            const { data: urlData } = sb.storage.from('fotos-socios').getPublicUrl(filePath);
            const foto_url = urlData?.publicUrl || null;

            let updateError;
            if (currentFotoType === 'socio') {
                const res = await sb.from('socios').update({ foto_url }).eq('id', currentFotoId);
                updateError = res.error;
            } else {
                const res = await sb.from('players').update({ photo: foto_url }).eq('player_id', currentFotoId);
                updateError = res.error;
            }

            if (updateError) {
                fotoModalMsg.textContent = 'Error al guardar: ' + updateError.message;
                fotoModalMsg.className = 'admin-modal-msg error';
            } else {
                fotoModalMsg.textContent = 'Foto actualizada correctamente';
                fotoModalMsg.className = 'admin-modal-msg success';
                fotoModalPreview.innerHTML = `<img src="${escapeHtml(foto_url)}" alt="Foto">`;
                if (currentFotoType === 'socio') loadSocios(); else loadPlayers();
            }

            fotoUploadBtn.disabled = false;
            fotoUploadBtn.innerHTML = '<i class="fas fa-upload"></i> Subir foto';
        });

        // ── Edit Socio Modal ──
        const editModal = document.getElementById('editModal');
        const editModalClose = document.getElementById('editModalClose');
        const editForm = document.getElementById('editForm');
        const editModalMsg = document.getElementById('editModalMsg');

        function openEditModal(id) {
            const socio = sociosData.find(s => s.id === id);
            if (!socio) return;

            document.getElementById('editId').value = socio.id;
            document.getElementById('editNombre').value = socio.nombre || '';
            document.getElementById('editApellido').value = socio.apellido || '';
            document.getElementById('editDocumento').value = socio.documento || '';
            document.getElementById('editEmail').value = socio.email || '';
            document.getElementById('editFecha').value = formatDate(socio.created_at);
            document.getElementById('editTipo').value = socio.tipo_socio || 'normal';
            document.getElementById('editEstadoPago').value = socio.estado_pago || 'pendiente';
            document.getElementById('editFamiliarDe').value = socio.familiar_de || '';

            editModalMsg.className = 'admin-modal-msg';
            editModalMsg.textContent = '';
            editModal.classList.add('is-active');
        }

        editModalClose.addEventListener('click', () => editModal.classList.remove('is-active'));
        editModal.addEventListener('click', e => { if (e.target === editModal) editModal.classList.remove('is-active'); });

        editForm.addEventListener('submit', async e => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const saveBtn = document.getElementById('editSaveBtn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';
            editModalMsg.className = 'admin-modal-msg';

            const { error } = await sb.from('socios').update({
                documento: document.getElementById('editDocumento').value.trim(),
                tipo_socio: document.getElementById('editTipo').value,
                estado_pago: document.getElementById('editEstadoPago').value,
                familiar_de: document.getElementById('editFamiliarDe').value.trim() || null
            }).eq('id', id);

            if (error) {
                editModalMsg.textContent = 'Error al guardar: ' + error.message;
                editModalMsg.className = 'admin-modal-msg error';
            } else {
                editModalMsg.textContent = 'Cambios guardados correctamente';
                editModalMsg.className = 'admin-modal-msg success';
                await loadSocios();
            }

            saveBtn.disabled = false;
            saveBtn.innerHTML = '<i class="fas fa-save"></i> Guardar cambios';
        });

        // Close modals with ESC
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                fotoModal.classList.remove('is-active');
                editModal.classList.remove('is-active');
            }
        });
    </script>
</body>
</html>
